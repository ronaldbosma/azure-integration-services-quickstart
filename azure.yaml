# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: azure-integration-services-quickstart
metadata:
  template: tdd-azure-integration-services-quickstart@1.18.7
services:
  functionApp:
    project: ./src/functionApp
    host: function
    language: csharp
  logicApp:
    project: ./src/logicApp
    dist: Workflows
    host: function
    language: js # Logic Apps aren't natively supported by azd yet. By using js, the logic app will be zipped and deployed.
requiredVersions:
  azd: ">= 1.23.15" # azd version 1.23.15 or higher is required because we're using features from Bicep 0.42.1.
